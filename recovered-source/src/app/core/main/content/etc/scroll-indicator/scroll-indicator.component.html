<div class="wrap" [ngClass]="{ dark: (this.ts.darkChange | async) > 0.5 }">
  <div class="indicator">
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
    <!-- <div class="dot delay"></div> -->
  </div>
  <p class="scroll mt-1 mt-md-3 text-center">
    <ng-container *ngIf="!this.site.isMobile"> Scroll down </ng-container>
    <ng-container *ngIf="this.site.isMobile"
      >Keep swiping up<br />
      or use the arrows</ng-container
    >
  </p>
</div>
