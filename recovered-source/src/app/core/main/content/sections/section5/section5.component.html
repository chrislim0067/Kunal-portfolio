<div class="wrap" [ngClass]="{ 'free-flight': this.ts.isFreeFlight | async }">
  <div class="container center-container">
    <div class="row">
      <div class="col-12 text-center">
        <h2 class="t t5">Let's explore</h2>
      </div>
    </div>
    <div class="row">
      <div class="col-12 text-center">
        <h1 class="apptitle t logofont t5">It's time to fly!</h1>
      </div>
    </div>
    <div class="row">
      <button class="custom-button dark big" (click)="startFlight()" mat-stroked-button color="inverted">Start</button>
    </div>
  </div>
</div>
